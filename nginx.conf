# ============================================================
# Nginx Config — SPA Static File Server
# ============================================================
# Minimal config for serving a Vite/React single-page app.
# Key features:
#   • Gzip compression for all text assets
#   • Long-term caching for hashed assets (JS/CSS)
#   • Fallback to index.html for client-side routing
#   • Security headers
# ============================================================

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths (for running as non-root)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 30;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Logging (stdout for container)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Hashed assets (immutable, long-term cache)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
