# ============================================================
# CircleCI — Build & Push Docker Image to Docker Hub
# ============================================================
# Single-job pipeline using machine executor + QEMU for
# multi-arch builds (free-plan compatible).
#
# Optimizations:
#   • Docker Layer Caching (DLC) for faster rebuilds
#   • Buildx with docker-container driver for multi-arch
#   • QEMU for arm64 cross-compilation on amd64 runner
#   • Short SHA + latest tags for versioning
#
# Required CircleCI Environment Variables (Project Settings → Environment Variables):
#   DOCKERHUB_USERNAME       — Your Docker Hub username
#   DOCKERHUB_TOKEN          — Docker Hub access token (Read, Write, Delete)
#   VITE_SUPABASE_URL        — Supabase project URL
#   VITE_SUPABASE_ANON_KEY   — Supabase anonymous key
# ============================================================

version: 2.1

jobs:
  build-and-push:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: medium
    steps:
      - checkout

      - run:
          name: Wait for Docker Daemon
          command: |
            echo "Waiting for Docker daemon to start..."
            for i in {1..30}; do
              docker info >/dev/null 2>&1 && exit 0
              sleep 1
            done
            echo "Failed to connect to Docker daemon. Logs:"
            sudo journalctl -u docker.service --no-pager | tail -n 50
            exit 1

      - run:
          name: Set up QEMU for multi-arch
          command: docker run --rm --privileged tonistiigi/binfmt --install all

      - run:
          name: Set up Docker Buildx
          command: |
            docker buildx create --name multiarch --driver docker-container --use
            docker buildx inspect --bootstrap

      - run:
          name: Login to Docker Hub
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - run:
          name: Build and push multi-arch image
          no_output_timeout: 20m
          command: |
            SHORT_SHA=$(echo "$CIRCLE_SHA1" | cut -c1-7)
            IMAGE="$DOCKERHUB_USERNAME/expense-tracker"

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
              --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
              --tag "$IMAGE:latest" \
              --tag "$IMAGE:$SHORT_SHA" \
              --push \
              .

      - run:
          name: Verify pushed image
          command: |
            IMAGE="$DOCKERHUB_USERNAME/expense-tracker"
            docker buildx imagetools inspect "$IMAGE:latest"

workflows:
  build-deploy:
    jobs:
      - build-and-push:
          filters:
            branches:
              only: main
