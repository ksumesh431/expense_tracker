# ============================================================
# CI/CD — Build & Push to Docker Hub
# ============================================================
# Triggers on push to main branch.
# Builds a multi-arch image (amd64 + arm64) and pushes to Docker Hub.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME       — Your Docker Hub username
#   DOCKERHUB_TOKEN          — Docker Hub access token (not password)
#   VITE_SUPABASE_URL        — Supabase project URL
#   VITE_SUPABASE_ANON_KEY   — Supabase anonymous key
# ============================================================

name: Build & Push Docker Image

# TEMPORARILY DISABLED — using CircleCI instead
# Uncomment the 'on:' block below to re-enable GitHub Actions
#
# on:
#   push:
#     branches: [main]
#   workflow_dispatch:

on: workflow_dispatch  # Manual-only until re-enabled

env:
  IMAGE_NAME: expense-tracker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # QEMU enables arm64 builds on amd64 GitHub runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
